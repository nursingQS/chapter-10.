<script>
    // Chapter 10: Fluid and Electrolytes – 38 questions (exact from document)
    const questions = [
        {
            id: 1,
            question: "1. The nurse is caring for a client who has a diagnosis of syndrome of inappropriate antidiuretic hormone secretion. The plan of care includes assessment of specific gravity every four hours. The results of this test will allow the nurse to assess which aspect of the client's health?",
            options: [
                "A. Nutritional status",
                "B. Potassium balance",
                "C. Calcium balance",
                "D. Fluid volume status"
            ],
            correct: 3, // D
            rationale: "Specific gravity measures the density of urine compared with water and can assess the ability of the kidneys to excrete or conserve water. Therefore, specific gravity will detect if the client has a fluid volume deficit or fluid volume excess. Nutrition, potassium, and calcium levels are not directly indicated. (PTS:1 REF:p.230)"
        },
        {
            id: 2,
            question: "2. The nurse is caring for a client admitted with a diagnosis of acute kidney injury. When reviewing the client's most recent laboratory reports, the nurse notes that the client's magnesium levels are high. The nurse should prioritize assessment for what health problem?",
            options: [
                "A. Diminished deep tendon reflexes",
                "B. Tachycardia",
                "C. Cool, clammy skin",
                "D. Acute flank pain"
            ],
            correct: 0, // A
            rationale: "To gauge a client's magnesium status, the nurse should check deep tendon reflexes. If the reflex is absent, this may indicate high serum magnesium. Tachycardia, flank pain, and cool, clammy skin are not typically associated with hypermagnesemia. (PTS:1 REF:p.254)"
        },
        {
            id: 3,
            question: "3. The nurse is working on a burn unit and an acutely ill client is exhibiting signs and symptoms of third spacing. Based on this change in status, the nurse should expect the client to exhibit signs and symptoms of which imbalance?",
            options: [
                "A. Metabolic alkalosis",
                "B. Hypermagnesemia",
                "C. Hypercalcemia",
                "D. Hypovolemia"
            ],
            correct: 3, // D
            rationale: "Third-spacing fluid shift, which occurs when fluid moves out of the intravascular space but not into the intracellular space, can cause hypovolemia. Increased calcium and magnesium levels are not indicators of third-spacing fluid shift. Burns typically cause acidosis, not alkalosis. (PTS:1 REF:p.226)"
        },
        {
            id: 4,
            question: "4. A client with a longstanding diagnosis of generalized anxiety disorder presents to the emergency room. The triage nurse notes upon assessment that the client is hyperventilating. The triage nurse is aware that hyperventilation is the most common cause of which acid--base imbalance?",
            options: [
                "A. Respiratory acidosis",
                "B. Respiratory alkalosis",
                "C. Increased PaCO2",
                "D. Metabolic acidosis"
            ],
            correct: 1, // B
            rationale: "Extreme anxiety can lead to hyperventilation, the most common cause of acute respiratory alkalosis. During hyperventilation, CO2 is lost through the lungs, creating an alkalotic state and a low PaCO2. Acute respiratory acidosis occurs in emergency situations, such as pulmonary edema, and is exhibited by hypoventilation and decreased PaCO2. Metabolic acidosis results from the loss of bicarbonate, not CO2. (PTS:1 REF:p.255)"
        },
        {
            id: 5,
            question: "5. The emergency-room nurse is caring for a trauma client who has the following arterial blood gas results: pH 7.26, PaCO2 28, HCO3 11 mEq/L. How should the nurse interpret these results?",
            options: [
                "A. Respiratory acidosis with no compensation",
                "B. Metabolic alkalosis with compensatory alkalosis",
                "C. Metabolic acidosis with no compensation",
                "D. Metabolic acidosis with compensatory respiratory alkalosis"
            ],
            correct: 3, // D
            rationale: "A low pH indicates acidosis (normal pH is 7.35 to 7.45). The PaCO2 is also low, which causes alkalosis. The bicarbonate is low, which causes acidosis. The pH bicarbonate more closely corresponds with a decrease in pH, making the metabolic component the primary problem. (PTS:1 REF:p.261)"
        },
        {
            id: 6,
            question: "6. While assessing a client's peripheral IV site, the nurse observes edema and coolness around the insertion site. How should the nurse document this observation?",
            options: [
                "A. Air embolism",
                "B. Phlebitis",
                "C. Infiltration",
                "D. Fluid overload"
            ],
            correct: 2, // C
            rationale: "Infiltration is the administration of non-vesicant solution or medication into the surrounding tissue when the IV cannula dislodges or perforates the wall of the vein. Infiltration is characterized by edema around the insertion site, leakage of IV fluid from the insertion site, discomfort and coolness, and a significant decrease in the flow rate. An air embolism occurs when air enters the vein; it does not have any local manifestations at the IV site but may produce palpitations, dyspnea, hypotension, and chest pain. Phlebitis, an inflammation of the vein, is characterized by redness, warmth, and tenderness at the IV site. Fluid volume overload produces systemic manifestations and is not apparent at the IV site. (PTS:1 REF:p.268)"
        },
        {
            id: 7,
            question: "7. The nurse is performing an admission assessment on a 79-year-old client newly admitted for end-stage liver disease. What principle should guide the nurse's assessment of the client's skin turgor?",
            options: [
                "A. Overhydration is common among healthy older adults.",
                "B. Dehydration causes the skin to appear spongy.",
                "C. Inelastic skin turgor is a normal part of aging.",
                "D. Skin turgor cannot be assessed in clients over the age of 70."
            ],
            correct: 2, // C
            rationale: "Inelastic skin is a normal change of aging. However, this does not mean that skin turgor cannot be assessed in older clients. Dehydration, not overhydration, causes inelastic skin with tenting. Overhydration, not dehydration, causes the skin to appear edematous and spongy. (PTS:1 REF:p.236)"
        },
        {
            id: 8,
            question: "8. A client with hypokalemia is to receive intravenous (IV) potassium replacement. Which action should the nurse take when administering potassium intravenously? Select all that apply.",
            options: [
                "A. Administer potassium by IV push.",
                "B. Assess blood urea nitrogen (BUN) and serum creatinine prior to potassium administration.",
                "C. Monitor complete blood count during potassium infusion.",
                "D. Follow the facility policy for infusion of potassium.",
                "E. Report a reduced urinary output to the health care provider."
            ],
            correct: [1,3,4], // B, D, E
            rationale: "Potassium should be administered by an infusion pump and should never be given by IV push to avoid rapid replacement. Because potassium is excreted by the kidneys, BUN, serum creatinine, and urinary output should be assessed prior to and during administration of IV potassium. Abnormal laboratory results or decreased or absent urinary output should be reported to the health care provider. Because potassium administration does not affect blood cells, the complete blood count does not need to be monitored during administration of potassium. The nurse should check facility policy on the administration of IV potassium to ensure safe care. (PTS:1 REF:p.245)"
        },
        {
            id: 9,
            question: "9. A nurse in the neurologic ICU has received a prescription to infuse a hypertonic solution into a client with increased intracranial pressure. This solution will increase the number of dissolved particles in the client's blood, creating pressure for fluids in the tissues to shift into the capillaries and increase the blood volume. This process is best described with which of the following terms?",
            options: [
                "A. Hydrostatic pressure",
                "B. Osmosis and osmolality",
                "C. Diffusion",
                "D. Active transport"
            ],
            correct: 1, // B
            rationale: "Osmosis is the movement of fluid from a region of low solute concentration to a region of high solute concentration across a semipermeable membrane. Hydrostatic pressure refers to changes in water or volume related to water pressure. Diffusion is the movement of solutes from an area of greater concentration to lesser concentration; the solutes in an intact vascular system are unable to move so diffusion normally should not be taking place. Active transport is the movement of molecules against the concentration gradient and requires adenosine triphosphate (ATP) as an energy source; this process typically takes place at the cellular level and is not involved in vascular volume changes. (PTS:1 REF:p.226)"
        },
        {
            id: 10,
            question: "10. The surgical nurse is caring for a client who is postoperative day 1 following a thyroidectomy. The client reports tingling in the lips and fingers. The client also reports an intermittent spasm in the wrist and hand and exhibits increased muscle tone. Which electrolyte imbalance should the nurse first suspect?",
            options: [
                "A. Hypophosphatemia",
                "B. Hypocalcemia",
                "C. Hypermagnesemia",
                "D. Hyperkalemia"
            ],
            correct: 1, // B
            rationale: "Tetany is the most characteristic manifestation of hypocalcemia and hypomagnesemia. Sensations of tingling may occur in the tips of the fingers, around the mouth, and, less commonly, in the feet. Hypophosphatemia creates central nervous dysfunction, resulting in seizures and coma. Hypermagnesemia creates hypoactive reflexes and somnolence. Signs of hyperkalemia include paresthesias and anxiety. (PTS:1 REF:p.248)"
        },
        {
            id: 11,
            question: "11. A nurse, who is orienting a newly licensed nurse, is planning care for a nephrology client. The nurse states, 'A client with kidney disease partially loses the ability to regulate changes in pH.' What is the cause of this partial inability?",
            options: [
                "A. The kidneys regulate and reabsorb carbonic acid to change and maintain pH.",
                "B. The kidneys buffer acids through electrolyte changes.",
                "C. The kidneys reabsorb and regenerate bicarbonate to maintain a stable pH.",
                "D. The kidneys combine carbonic acid and bicarbonate to maintain a stable pH."
            ],
            correct: 2, // C
            rationale: "The kidneys regulate the bicarbonate level in the extracellular fluid; they can regenerate bicarbonate ions as well as reabsorb them from the renal tubular cells. In respiratory acidosis and most cases of metabolic acidosis, the kidneys excrete hydrogen ions and conserve bicarbonate ions to help restore balance. The lungs regulate and reabsorb carbonic acid to change and maintain pH. The kidneys do not buffer acids through electrolyte changes; buffering occurs in reaction to changes in pH. Carbonic acid works as the chemical medium to exchange O2 and CO2 in the lungs to maintain a stable pH, whereas the kidneys use bicarbonate as the chemical medium to maintain a stable pH by moving and eliminating H+. (PTS:1 REF:p.259)"
        },
        {
            id: 12,
            question: "12. The nurse is caring for a client admitted to the medical unit 72 hours ago with pyloric stenosis. A nasogastric tube was placed upon admission, and since that time the client has been on low intermittent suction. Upon review of the morning's blood work, the nurse notices that the client's potassium is below reference range. The nurse should assess for signs and symptoms of what imbalance?",
            options: [
                "A. Hypercalcemia",
                "B. Metabolic acidosis",
                "C. Metabolic alkalosis",
                "D. Respiratory acidosis"
            ],
            correct: 2, // C
            rationale: "Probably the most common cause of metabolic alkalosis is vomiting or gastric suction with loss of hydrogen and chloride ions. The disorder also occurs in pyloric stenosis in which only gastric fluid is lost. Vomiting, gastric suction, and pyloric stenosis all remove potassium and can cause hypokalemia. This client would not be at risk for hypercalcemia; hyperparathyroidism and cancer account for almost all cases of hypercalcemia. The nasogastric tube is removing stomach acid and will likely raise pH. Respiratory acidosis is unlikely since no change was reported in the client's respiratory status. (PTS:1 REF:p.261)"
        },
        {
            id: 13,
            question: "13. The nurse is caring for a client who has a peripheral IV in place for fluid replacement. When caring for the client's IV site, the nurse should:",
            options: [
                "A. ensure that anticoagulants are placed on hold for the duration of IV therapy.",
                "B. replace the IV dressing with a new, clean dressing if it is soiled.",
                "C. ensure that the tubing is firmly anchored to the client's skin.",
                "D. periodically remove hair from 2 cm around the IV site."
            ],
            correct: 2, // C
            rationale: "Anchoring the IV tubing prevents it from being accidentally dislodged. Anticoagulants are not contraindicated during IV therapy. Soiled dressings should be replaced with a new sterile dressing, not a clean dressing. Hair removal is unnecessary. (PTS:1 REF:p.267)"
        },
        {
            id: 14,
            question: "14. A client who is being treated for pneumonia reports sudden shortness of breath. An arterial blood gas (ABG) is drawn. The ABG has the following values: pH 7.21, PaCO2 64 mm Hg, HCO3 24 mm Hg. Which condition does the ABG reflect?",
            options: [
                "A. Respiratory acidosis",
                "B. Metabolic alkalosis",
                "C. Respiratory alkalosis",
                "D. Metabolic acidosis"
            ],
            correct: 0, // A
            rationale: "The pH is below 7.35, PaCO2 is greater than 40, and the HCO3 is normal; therefore, it is a respiratory acidosis, and compensation by the kidneys has not begun, which indicates this was probably an acute event. The HCO3 of 24 is within the normal range, so it is not metabolic alkalosis. The pH of 7.21 indicates an acidosis, not alkalosis. The pH of 7.21 indicates it is an acidosis, but the HCO3 of 24 is within the normal range, ruling out metabolic acidosis. (PTS:1 REF:p.262)"
        },
        {
            id: 15,
            question: "15. One day after a client is admitted to the medical unit, the nurse determines that the client is oliguric. The nurse notifies the acute-care nurse practitioner who prescribes a fluid challenge of 200 mL of normal saline solution over 15 minutes. This intervention will help to achieve what goal?",
            options: [
                "A. Distinguish hyponatremia from hypernatremia.",
                "B. Evaluate pituitary gland function.",
                "C. Distinguish reduced renal blood flow from decreased renal function.",
                "D. Provide an effective treatment for hypertension-induced oliguria."

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
